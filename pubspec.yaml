name: flutter_oembed
description: "A Flutter package for embedding social media content (X, TikTok, Instagram, Facebook, YouTube, Spotify, Vimeo, and more) using the OEmbed protocol with WebView rendering."
version: 1.0.0
repository: https://github.com/yuhangang/flutter_oembed
homepage: https://github.com/yuhangang/flutter_oembed
issue_tracker: https://github.com/yuhangang/flutter_oembed/issues
topics:
  - oembed
  - social-media
  - youtube
  - tiktok
  - iframe

environment:
  sdk: ^3.5.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.13.1
  webview_flutter_wkwebview: ^3.24.2
  visibility_detector: ^0.4.0+2
  http: ^1.2.0
  equatable: ^2.0.7
  collection: ^1.19.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  plugin_platform_interface: ^2.1.8
  webview_flutter_platform_interface: ^2.14.0
  fake_async: ^1.1.0
  file: ^7.0.0

flutter:
